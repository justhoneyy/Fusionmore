services:
  - type: web
    name: fusion-coaching
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers=4 --timeout=120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fusion-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: fusion-db
    plan: free
    databaseName: fusion_coaching
    user: fusion_user
