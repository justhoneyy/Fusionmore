services:
  - type: web
    name: fusion-coaching
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fusion-coaching-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@fusioncoaching.in
      - key: ADMIN_PASSWORD
        value: Admin@Fusion2026
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: +14155238886
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: fusion-coaching-db
    plan: free
    databaseName: fusion_coaching
    ipAllowList: []
